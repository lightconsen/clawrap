<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; frame-src http://127.0.0.1:*;">
  <title>OpenClaw</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #header {
      height: 40px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      padding: 0 16px;
      justify-content: space-between;
    }

    #header .title {
      font-size: 14px;
      font-weight: 500;
    }

    #header .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #8b949e;
    }

    #header .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #238636;
      animation: pulse 2s infinite;
    }

    #header .settings-icon {
      width: 16px;
      height: 16px;
      margin-left: 4px;
      cursor: pointer;
      opacity: 1;
      transition: opacity 0.2s;
    }

    #header .settings-icon:hover {
      opacity: 1;
      filter: brightness(1.2);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    #terminal-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #terminal-frame {
      flex: 1;
      border: none;
      background: #0d1117;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    #loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #30363d;
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: none;
    }

    #error h2 {
      color: #f85149;
      margin-bottom: 8px;
    }

    #error p {
      color: #8b949e;
      margin-bottom: 16px;
    }

    .btn {
      padding: 8px 16px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn:hover {
      background: #2ea043;
    }

    /* Settings container styles */
    #settings-container {
      flex: 1;
      display: none;
      overflow: hidden;
      flex-direction: column;
    }
    #settings-container.visible {
      display: flex;
    }
    .settings-header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .settings-header h1 {
      font-size: 18px;
      color: #f0f6fc;
      font-weight: 600;
    }
    .close-btn {
      background: none;
      border: none;
      color: #8b949e;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .close-btn:hover {
      color: #e6edf3;
      background: #30363d;
    }
    .tabs-container {
      display: flex;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 0 20px;
    }
    .tab {
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      color: #8b949e;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .tab:hover {
      color: #e6edf3;
    }
    .tab.active {
      color: #58a6ff;
      border-bottom-color: #58a6ff;
    }
    .settings-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #f0f6fc;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #30363d;
    }
    .setting-item {
      margin-bottom: 16px;
      padding: 16px;
      background: #161b22;
      border-radius: 8px;
      border: 1px solid #30363d;
    }
    .setting-label {
      font-size: 12px;
      color: #8b949e;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .setting-value {
      font-size: 14px;
      color: #e6edf3;
      font-family: 'SF Mono', Monaco, monospace;
    }
    .setting-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }
    .setting-row .setting-item {
      flex: 1;
      min-width: 200px;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-badge.running {
      background: #238636;
      color: white;
    }
    .status-badge.stopped {
      background: #f85149;
      color: white;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .btn {
      padding: 8px 16px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.2s;
      margin-right: 8px;
      margin-top: 8px;
    }
    .btn:hover {
      background: #2ea043;
    }
    .btn.secondary {
      background: #21262d;
      border: 1px solid #30363d;
    }
    .btn.secondary:hover {
      background: #30363d;
    }
    .btn.danger {
      background: #da3633;
    }
    .btn.danger:hover {
      background: #f85149;
    }
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }
    .model-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 16px;
    }
    .model-name {
      font-size: 14px;
      font-weight: 600;
      color: #f0f6fc;
      margin-bottom: 4px;
    }
    .model-provider {
      font-size: 12px;
      color: #8b949e;
    }
    .channel-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .channel-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
    }
    .channel-name {
      font-size: 13px;
      color: #e6edf3;
    }
    .channel-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #238636;
      color: white;
    }
    .empty-state {
      text-align: center;
      padding: 40px;
      color: #8b949e;
    }
    .log-output {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 12px;
      color: #8b949e;
      max-height: 150px;
      overflow-y: auto;
      margin-top: 12px;
    }
    .skills-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .skill-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      transition: border-color 0.2s;
    }
    .skill-item:hover {
      border-color: #58a6ff;
    }
    .skill-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .skill-name {
      font-size: 13px;
      color: #e6edf3;
      font-weight: 500;
    }
    .skill-description {
      font-size: 11px;
      color: #8b949e;
    }
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      background: #21262d;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s;
      border: 1px solid #30363d;
    }
    .toggle-switch.enabled {
      background: #238636;
      border-color: #238636;
    }
    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 18px;
      height: 18px;
      background: #e6edf3;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle-switch.enabled::after {
      transform: translateX(20px);
    }
    .tools-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .tool-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
    }
    .tool-name {
      font-size: 13px;
      color: #e6edf3;
      font-family: 'SF Mono', Monaco, monospace;
    }
  </style>
</head>
<body>
  <div id="header">
    <div class="title">OpenClaw</div>
    <div class="status">
      <span class="status-indicator"></span>
      <span id="gateway-status">Gateway Connected</span>
      <svg class="settings-icon" viewBox="0 0 16 16" fill="currentColor" onclick="openSettings()">
        <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/>
        <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319z"/>
      </svg>
    </div>
  </div>

  <div id="terminal-container">
    <div id="loading">
      <div class="spinner"></div>
      <p>Connecting to OpenClaw gateway...</p>
    </div>

    <div id="error">
      <h2>Connection Failed</h2>
      <p id="error-message">Unable to connect to the OpenClaw gateway.</p>
      <button class="btn" onclick="retryConnection()">Retry</button>
    </div>

    <iframe id="terminal-frame" style="display: none;"></iframe>
  </div>

  <div id="settings-container">
    <div class="settings-header">
      <h1>Settings</h1>
      <button class="close-btn" onclick="closeSettings()">&times;</button>
    </div>
    <div class="tabs-container">
      <button class="tab active" onclick="switchTab('overview')">Overview</button>
      <button class="tab" onclick="switchTab('model')">Model Settings</button>
      <button class="tab" onclick="switchTab('skills')">Skills</button>
      <button class="tab" onclick="switchTab('channels')">Channels</button>
      <button class="tab" onclick="switchTab('gateway')">Gateway Control</button>
    </div>
    <div class="settings-content">
      <div id="settings-content-inner">
        <!-- Content loaded dynamically -->
      </div>
    </div>
  </div>

  <script>
    // Get gateway port from main process (injected via executeJavaScript)
    let gatewayPort = window.__OPENCLAW_GATEWAY_PORT__ || 9090;
    let config = window.__OPENCLAW_CONFIG__ || {};

    const terminalFrame = document.getElementById('terminal-frame');
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error');
    const errorMessageEl = document.getElementById('error-message');
    const gatewayStatusEl = document.getElementById('gateway-status');

    let currentToken = null;
    let isFrameLoaded = false;

    async function initializeTerminal() {
      try {
        // Check gateway status with retry for token
        let status = await window.electronAPI.getGatewayStatus();
        let retryCount = 0;
        const maxRetries = 20;

        // Retry until gateway is running
        while (!status.running && retryCount < maxRetries) {
          await new Promise(resolve => setTimeout(resolve, 500));
          status = await window.electronAPI.getGatewayStatus();
          retryCount++;
        }

        if (!status.running) {
          throw new Error('Gateway is not running');
        }

        gatewayPort = status.port || gatewayPort;

        // Keep checking for token and reload iframe when token becomes available
        await loadTerminalWithToken(status.token);

      } catch (error) {
        showError(error.message);
      }
    }

    async function loadTerminalWithToken(initialToken) {
      // Build the terminal URL
      // Use root path '/' so relative URLs in the gateway UI resolve correctly
      let terminalUrl = `http://127.0.0.1:${gatewayPort}/`;

      // Add token as query parameter if available
      const token = initialToken || window.__OPENCLAW_GATEWAY_TOKEN__;
      if (token) {
        terminalUrl += `?token=${encodeURIComponent(token)}`;
        currentToken = token;
        console.log('Using gateway token for authentication');
      } else {
        console.warn('No gateway token available - waiting for token...');
        // Keep checking for token
        checkForTokenAndReload();
      }

      // Load the OpenClaw terminal
      if (!isFrameLoaded || token !== currentToken) {
        terminalFrame.src = terminalUrl;
        isFrameLoaded = true;
      }

      terminalFrame.onload = () => {
        loadingEl.style.display = 'none';
        terminalFrame.style.display = 'block';
        gatewayStatusEl.textContent = `Gateway running on port ${gatewayPort}`;
      };

      terminalFrame.onerror = () => {
        showError('Failed to load terminal interface');
      };
    }

    async function checkForTokenAndReload() {
      // Check every 1 second for up to 30 seconds
      for (let i = 0; i < 30; i++) {
        await new Promise(resolve => setTimeout(resolve, 1000));
        const status = await window.electronAPI.getGatewayStatus();

        if (status.token && status.token !== currentToken) {
          console.log('Token now available, reloading terminal with authentication');
          currentToken = status.token;
          const terminalUrl = `http://127.0.0.1:${gatewayPort}/?token=${encodeURIComponent(status.token)}`;
          terminalFrame.src = terminalUrl;
          return;
        }
      }
      console.warn('Token not available after 30 seconds - terminal may show unauthorized error');
    }

    function showError(message) {
      loadingEl.style.display = 'none';
      terminalFrame.style.display = 'none';
      errorEl.style.display = 'block';
      errorMessageEl.textContent = message;
      gatewayStatusEl.textContent = 'Gateway Disconnected';
      document.querySelector('.status-indicator').style.background = '#f85149';
    }

    async function retryConnection() {
      errorEl.style.display = 'none';
      loadingEl.style.display = 'block';

      try {
        await window.electronAPI.restartGateway();
        await initializeTerminal();
      } catch (error) {
        showError(error.message);
      }
    }

    function openSettings() {
      console.log('[Settings] openSettings called');
      // Hide terminal, show settings
      terminalFrame.style.display = 'none';
      loadingEl.style.display = 'none';
      errorEl.style.display = 'none';
      const settingsContainer = document.getElementById('settings-container');
      console.log('[Settings] settings-container element:', settingsContainer);
      settingsContainer.classList.add('visible');
      console.log('[Settings] settings-container visible class added, now calling loadSettingsData');
      loadSettingsData();
    }

    function closeSettings() {
      console.log('[Settings] closeSettings called');
      // Hide settings, show terminal
      document.getElementById('settings-container').classList.remove('visible');
      terminalFrame.style.display = 'block';
    }

    async function loadSettingsData() {
      console.log('[Settings] loadSettingsData called');
      try {
        console.log('[Settings] calling getSettingsData...');
        const data = await window.electronAPI.getSettingsData();
        console.log('[Settings] data received:', data);
        renderSettingsContent(data);
      } catch (error) {
        console.error('[Settings] Failed to load settings data:', error);
      }
    }

    function renderSettingsContent(data) {
      console.log('[Settings] renderSettingsContent called');
      const { config, status, installCheck } = data;
      const enabledSkills = config.settings.skills?.enabled || [];
      const enabledTools = config.settings.tools?.enabled || [];

      const settingsContentEl = document.getElementById('settings-content-inner');
      console.log('[Settings] settings-content-inner element:', settingsContentEl);

      if (!settingsContentEl) {
        console.error('[Settings] settings-content-inner element not found!');
        return;
      }

      const html = `
        <!-- Overview Tab -->
        <div id="overview" class="tab-content active">
          <div class="section-title">System Overview</div>
          <div class="info-grid">
            <div class="setting-item">
              <div class="setting-label">OpenClaw Desktop Version</div>
              <div class="setting-value">v1.0.1</div>
            </div>
            <div class="setting-item">
              <div class="setting-label">OpenClaw CLI Version</div>
              <div class="setting-value">${installCheck.version || 'Not installed'}</div>
            </div>
            <div class="setting-item">
              <div class="setting-label">Gateway Port</div>
              <div class="setting-value">${status.port || config.settings.gateway.port || 18789}</div>
            </div>
            <div class="setting-item">
              <div class="setting-label">Gateway Status</div>
              <span class="status-badge ${status.running ? 'running' : 'stopped'}">
                <span class="status-dot"></span>
                ${status.running ? 'Running' : 'Stopped'}
              </span>
            </div>
          </div>
          <div class="section-title" style="margin-top: 24px;">Configuration Paths</div>
          <div class="setting-item">
            <div class="setting-label">Config Directory</div>
            <div class="setting-value">${process.env.HOME || process.env.USERPROFILE}/.openclaw</div>
          </div>
        </div>

        <!-- Model Settings Tab -->
        <div id="model" class="tab-content">
          <div class="section-title">Current Model Configuration</div>
          ${config.settings.model ? `
            <div class="model-card">
              <div class="model-name">${config.settings.model.name}</div>
              <div class="model-provider">Provider: ${config.settings.model.provider}</div>
              <div class="model-provider">Model ID: ${config.settings.model.id}</div>
            </div>
          ` : '<div class="empty-state">No model configured. Please run setup to configure a model.</div>'}
          <div class="section-title" style="margin-top: 24px;">Available Presets</div>
          <div class="info-grid">
            <div class="model-card">
              <div class="model-name">Claude Sonnet 4.6</div>
              <div class="model-provider">Anthropic</div>
            </div>
            <div class="model-card">
              <div class="model-name">GPT-4o</div>
              <div class="model-provider">OpenAI</div>
            </div>
            <div class="model-card">
              <div class="model-name">DeepSeek-V3</div>
              <div class="model-provider">DeepSeek</div>
            </div>
            <div class="model-card">
              <div class="model-name">Gemini 2.5 Pro</div>
              <div class="model-provider">Google</div>
            </div>
          </div>
        </div>

        <!-- Channels Settings Tab -->
        <div id="channels" class="tab-content">
          <div class="section-title">Enabled Channels</div>
          <div class="channel-list">
            ${config.settings.bypass_channels && config.settings.bypass_channels.length > 0 ?
              config.settings.bypass_channels.map(ch => `
                <div class="channel-item">
                  <span class="channel-name">${ch.type}</span>
                  <span class="channel-status">${ch.enabled ? 'Enabled' : 'Disabled'}</span>
                </div>
              `).join('')
              : '<div class="empty-state">No bypass channels configured</div>'
            }
          </div>
        </div>

        <!-- Skills Settings Tab -->
        <div id="skills" class="tab-content">
          <div class="section-title">Skills</div>
          <div class="skills-list">
            ${getSkillsHTML(enabledSkills)}
          </div>
          <div class="section-title" style="margin-top: 24px;">Tools</div>
          <div class="tools-list">
            ${getToolsHTML(enabledTools)}
          </div>
        </div>

        <!-- Gateway Control Panel Tab -->
        <div id="gateway" class="tab-content">
          <div class="section-title">Gateway Control</div>
          <div class="setting-item">
            <div class="setting-label">Gateway Process</div>
            <div style="margin-top: 12px;">
              <button class="btn" onclick="alert('Restart gateway functionality would be implemented here')">Restart Gateway</button>
              <button class="btn secondary" onclick="alert('Stop gateway functionality would be implemented here')">Stop Gateway</button>
              <button class="btn danger" onclick="alert('Force kill functionality would be implemented here')">Force Kill</button>
            </div>
            <div class="log-output">
> Gateway PID: ${status.pid || 'N/A'}<br>
> Port: ${status.port || 'N/A'}<br>
> Token: ${status.token ? 'Configured' : 'Not set'}<br>
> Last checked: ${new Date().toLocaleTimeString()}
            </div>
          </div>
          <div class="section-title" style="margin-top: 24px;">Diagnostics</div>
          <div class="setting-row">
            <div class="setting-item" style="flex: 1;">
              <div class="setting-label">Installation Path</div>
              <div class="setting-value" style="font-size: 11px;">${installCheck.path || 'Not found'}</div>
            </div>
            <div class="setting-item" style="flex: 1;">
              <div class="setting-label">Node.js Version Check</div>
              <div class="setting-value">${installCheck.installed ? 'Pass' : 'Fail'}</div>
            </div>
          </div>
        </div>
      `;

      console.log('[Settings] Setting innerHTML, html length:', html.length);
      settingsContentEl.innerHTML = html;
      console.log('[Settings] innerHTML set, innerHTML now:', settingsContentEl.innerHTML.substring(0, 100));

      // Store state globally for toggle functions
      window.__enabledSkills = [...enabledSkills];
      window.__enabledTools = [...enabledTools];
      console.log('[Settings] renderSettingsContent complete');
    }

    function getSkillsHTML(enabledSkills) {
      const skills = [
        { id: "everything-claude-code:plan", name: "Plan", description: "Plan mode for architectural planning" },
        { id: "everything-claude-code:tdd", name: "TDD", description: "Test-driven development mode" },
        { id: "everything-claude-code:e2e", name: "E2E", description: "End-to-end testing mode" },
        { id: "everything-claude-code:python-review", name: "Python Review", description: "Python code review" },
        { id: "everything-claude-code:go-review", name: "Go Review", description: "Go code review" },
        { id: "everything-claude-code:security-reviewer", name: "Security Reviewer", description: "Security analysis" }
      ];
      return skills.map(skill => {
        const isEnabled = enabledSkills.includes(skill.id);
        return `
          <div class="skill-item">
            <div class="skill-info">
              <span class="skill-name">${skill.name}</span>
              <span class="skill-description">${skill.description}</span>
            </div>
            <div class="toggle-switch ${isEnabled ? 'enabled' : ''}" onclick="toggleSkill('${skill.id}', this)"></div>
          </div>
        `;
      }).join('');
    }

    function getToolsHTML(enabledTools) {
      const tools = ['Read', 'Write', 'Edit', 'Bash', 'Grep', 'Glob', 'Task'];
      return tools.map(tool => {
        const isEnabled = enabledTools.includes(tool);
        return `
          <div class="tool-item">
            <span class="tool-name">${tool}</span>
            <div class="toggle-switch ${isEnabled ? 'enabled' : ''}" onclick="toggleTool('${tool}', this)"></div>
          </div>
        `;
      }).join('');
    }

    function switchTab(tabName) {
      console.log('[Settings] switchTab called with:', tabName);
      const tabContents = document.querySelectorAll('.tab-content');
      console.log('[Settings] found tab-content elements:', tabContents.length);
      tabContents.forEach(content => {
        content.classList.remove('active');
      });
      document.querySelectorAll('.tab').forEach(tab => {
        tab.classList.remove('active');
      });
      const targetTab = document.getElementById(tabName);
      console.log('[Settings] target tab element:', targetTab);
      if (targetTab) {
        targetTab.classList.add('active');
      }
      if (event && event.target) {
        event.target.classList.add('active');
      }
    }

    function toggleSkill(skillId, toggleEl) {
      const enabledSkills = window.__enabledSkills || [];
      const index = enabledSkills.indexOf(skillId);
      if (index > -1) {
        enabledSkills.splice(index, 1);
        toggleEl.classList.remove('enabled');
      } else {
        enabledSkills.push(skillId);
        toggleEl.classList.add('enabled');
      }
      window.__enabledSkills = enabledSkills;
      window.electronAPI.setSkills(enabledSkills);
    }

    function toggleTool(toolName, toggleEl) {
      const enabledTools = window.__enabledTools || [];
      const index = enabledTools.indexOf(toolName);
      if (index > -1) {
        enabledTools.splice(index, 1);
        toggleEl.classList.remove('enabled');
      } else {
        enabledTools.push(toolName);
        toggleEl.classList.add('enabled');
      }
      window.__enabledTools = enabledTools;
      window.electronAPI.setTools(enabledTools);
    }

    // Initialize on load
    initializeTerminal();

    // Periodic status check
    setInterval(async () => {
      try {
        const status = await window.electronAPI.getGatewayStatus();
        if (!status.running) {
          gatewayStatusEl.textContent = 'Gateway Disconnected';
          document.querySelector('.status-indicator').style.background = '#f85149';
        } else {
          gatewayStatusEl.textContent = `Gateway running on port ${status.port}`;
          document.querySelector('.status-indicator').style.background = '#238636';
        }
      } catch (error) {
        // Ignore errors
      }
    }, 5000);
  </script>
</body>
</html>
