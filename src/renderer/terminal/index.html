<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Terminal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    #header {
      height: 40px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      padding: 0 16px;
      justify-content: space-between;
    }

    #header .title {
      font-size: 14px;
      font-weight: 500;
    }

    #header .status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #8b949e;
    }

    #header .status-indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #238636;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    #terminal-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #terminal-frame {
      flex: 1;
      border: none;
      background: #0d1117;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    #loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #30363d;
      border-top-color: #22c55e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: none;
    }

    #error h2 {
      color: #f85149;
      margin-bottom: 8px;
    }

    #error p {
      color: #8b949e;
      margin-bottom: 16px;
    }

    .btn {
      padding: 8px 16px;
      background: #238636;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn:hover {
      background: #2ea043;
    }
  </style>
</head>
<body>
  <div id="header">
    <div class="title">OpenClaw Terminal</div>
    <div class="status">
      <span class="status-indicator"></span>
      <span id="gateway-status">Gateway Connected</span>
    </div>
  </div>

  <div id="terminal-container">
    <div id="loading">
      <div class="spinner"></div>
      <p>Connecting to OpenClaw gateway...</p>
    </div>

    <div id="error">
      <h2>Connection Failed</h2>
      <p id="error-message">Unable to connect to the OpenClaw gateway.</p>
      <button class="btn" onclick="retryConnection()">Retry</button>
    </div>

    <iframe id="terminal-frame" style="display: none;"></iframe>
  </div>

  <script>
    // Get gateway port from main process (injected via executeJavaScript)
    let gatewayPort = window.__OPENCLAW_GATEWAY_PORT__ || 9090;
    let config = window.__OPENCLAW_CONFIG__ || {};

    const terminalFrame = document.getElementById('terminal-frame');
    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error');
    const errorMessageEl = document.getElementById('error-message');
    const gatewayStatusEl = document.getElementById('gateway-status');

    async function initializeTerminal() {
      try {
        // Check gateway status
        const status = await window.electronAPI.getGatewayStatus();

        if (!status.running) {
          throw new Error('Gateway is not running');
        }

        gatewayPort = status.port || gatewayPort;

        // Load the OpenClaw terminal
        // This URL would be the actual OpenClaw web terminal served by the gateway
        const terminalUrl = `http://127.0.0.1:${gatewayPort}/terminal`;

        // For now, we'll show a placeholder that simulates the terminal
        // In a real implementation, this would load the actual OpenClaw web UI
        terminalFrame.src = terminalUrl;

        terminalFrame.onload = () => {
          loadingEl.style.display = 'none';
          terminalFrame.style.display = 'block';
          gatewayStatusEl.textContent = `Gateway running on port ${gatewayPort}`;
        };

        terminalFrame.onerror = () => {
          showError('Failed to load terminal interface');
        };

      } catch (error) {
        showError(error.message);
      }
    }

    function showError(message) {
      loadingEl.style.display = 'none';
      terminalFrame.style.display = 'none';
      errorEl.style.display = 'block';
      errorMessageEl.textContent = message;
      gatewayStatusEl.textContent = 'Gateway Disconnected';
      document.querySelector('.status-indicator').style.background = '#f85149';
    }

    async function retryConnection() {
      errorEl.style.display = 'none';
      loadingEl.style.display = 'block';

      try {
        await window.electronAPI.restartGateway();
        await initializeTerminal();
      } catch (error) {
        showError(error.message);
      }
    }

    // Initialize on load
    initializeTerminal();

    // Periodic status check
    setInterval(async () => {
      try {
        const status = await window.electronAPI.getGatewayStatus();
        if (!status.running) {
          gatewayStatusEl.textContent = 'Gateway Disconnected';
          document.querySelector('.status-indicator').style.background = '#f85149';
        } else {
          gatewayStatusEl.textContent = `Gateway running on port ${status.port}`;
          document.querySelector('.status-indicator').style.background = '#238636';
        }
      } catch (error) {
        // Ignore errors
      }
    }, 5000);
  </script>
</body>
</html>
