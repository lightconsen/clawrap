name: Build Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # Check version bump on push to main
  check-version:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      version_changed: ${{ steps.version-check.outputs.changed }}
      version: ${{ steps.version-check.outputs.version }}
      prev_version: ${{ steps.version-check.outputs.prev_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check version bump
        id: version-check
        run: |
          # Get current version from package.json
          CURRENT_VERSION=$(jq -r '.version' package.json)
          echo "Current version: $CURRENT_VERSION"

          # Get previous version from previous commit
          git show HEAD~1:package.json > /tmp/prev-package.json 2>/dev/null || echo '{"version":"0.0.0"}' > /tmp/prev-package.json
          PREV_VERSION=$(jq -r '.version' /tmp/prev-package.json)
          echo "Previous version: $PREV_VERSION"

          # Compare versions using semver
          if [ "$CURRENT_VERSION" = "$PREV_VERSION" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged: $CURRENT_VERSION"
          else
            # Simple version comparison (split by dots and compare)
            CURRENT_MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
            CURRENT_MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
            CURRENT_PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)

            PREV_MAJOR=$(echo $PREV_VERSION | cut -d. -f1)
            PREV_MINOR=$(echo $PREV_VERSION | cut -d. -f2)
            PREV_PATCH=$(echo $PREV_VERSION | cut -d. -f3)

            # Check if current > previous
            if [ "$CURRENT_MAJOR" -gt "$PREV_MAJOR" ] || \
               ([ "$CURRENT_MAJOR" -eq "$PREV_MAJOR" ] && [ "$CURRENT_MINOR" -gt "$PREV_MINOR" ]) || \
               ([ "$CURRENT_MAJOR" -eq "$PREV_MAJOR" ] && [ "$CURRENT_MINOR" -eq "$PREV_MINOR" ] && [ "$CURRENT_PATCH" -gt "$PREV_PATCH" ]); then
              echo "changed=true" >> $GITHUB_OUTPUT
              echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
              echo "prev_version=$PREV_VERSION" >> $GITHUB_OUTPUT
              echo "✅ Version bumped: $PREV_VERSION → $CURRENT_VERSION"
            else
              echo "changed=false" >> $GITHUB_OUTPUT
              echo "⚠️ Version decreased or invalid: $PREV_VERSION → $CURRENT_VERSION"
            fi
          fi

  build:
    needs: check-version
    if: github.event_name == 'pull_request' || needs.check-version.outputs.version_changed == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: mac
            name: macOS
            arch: universal
            electron_arch: x64,arm64
          - os: windows-latest
            target: win
            name: Windows
            arch: x64
            electron_arch: x64
          - os: ubuntu-latest
            target: linux
            name: Linux
            arch: x64
            electron_arch: x64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      # Install dependencies WITHOUT running postinstall scripts
      - name: Install dependencies (skip scripts)
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Manually download electron binary for this platform
      - name: Download electron binary
        shell: bash
        run: |
          ELECTRON_VERSION=41.0.4
          ELECTRON_CACHE_DIR="$HOME/.cache/electron"
          mkdir -p "$ELECTRON_CACHE_DIR"

          if [[ "${{ matrix.target }}" == "mac" ]]; then
            # Download both x64 and arm64 for macOS
            for arch in x64 arm64; do
              FILENAME="electron-v${ELECTRON_VERSION}-darwin-${arch}.zip"
              URL="https://github.com/electron/electron/releases/download/v${ELECTRON_VERSION}/${FILENAME}"
              echo "Downloading ${FILENAME}..."
              curl -L --retry 3 --retry-delay 5 -o "$ELECTRON_CACHE_DIR/$FILENAME" "$URL" || echo "Failed to download ${FILENAME}"
            done
          elif [[ "${{ matrix.target }}" == "win" ]]; then
            FILENAME="electron-v${ELECTRON_VERSION}-win32-x64.zip"
            URL="https://github.com/electron/electron/releases/download/v${ELECTRON_VERSION}/${FILENAME}"
            echo "Downloading ${FILENAME}..."
            curl -L --retry 3 --retry-delay 5 -o "$ELECTRON_CACHE_DIR/$FILENAME" "$URL"
          elif [[ "${{ matrix.target }}" == "linux" ]]; then
            FILENAME="electron-v${ELECTRON_VERSION}-linux-x64.zip"
            URL="https://github.com/electron/electron/releases/download/v${ELECTRON_VERSION}/${FILENAME}"
            echo "Downloading ${FILENAME}..."
            curl -L --retry 3 --retry-delay 5 -o "$ELECTRON_CACHE_DIR/$FILENAME" "$URL"
          fi

          echo "Electron cache contents:"
          ls -la "$ELECTRON_CACHE_DIR/"

      # Run electron postinstall manually
      - name: Run electron postinstall
        run: cd node_modules/electron && node install.js

      # Run electron-builder install-app-deps
      - name: Install app dependencies
        run: npx electron-builder install-app-deps

      - name: Build TypeScript
        run: pnpm build:ts

      # macOS signing setup
      - name: Setup macOS signing
        if: matrix.target == 'mac' && env.APPLE_CERTIFICATE
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productbuild: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      # Windows signing setup
      - name: Setup Windows signing
        if: matrix.target == 'win' && env.WIN_CERTIFICATE
        shell: bash
        env:
          WIN_CERTIFICATE: ${{ secrets.WIN_CERTIFICATE }}
        run: |
          echo "$WIN_CERTIFICATE" | base64 --decode > certificate.pfx

      # Build installers - separate steps for signed vs unsigned
      - name: Build ${{ matrix.name }} installer (with signing)
        if: matrix.target == 'mac' && env.APPLE_CERTIFICATE
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEYCHAIN: build.keychain
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building macOS with code signing..."
          npx electron-builder --mac --publish never

      - name: Build ${{ matrix.name }} installer (with signing)
        if: matrix.target == 'win' && env.WIN_CERTIFICATE
        env:
          WIN_CSC_LINK: certificate.pfx
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building Windows with code signing..."
          npx electron-builder --win --publish never

      - name: Build ${{ matrix.name }} installer (no signing)
        if: (matrix.target == 'mac' && !env.APPLE_CERTIFICATE) || (matrix.target == 'win' && !env.WIN_CERTIFICATE) || matrix.target == 'linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building ${{ matrix.name }} without signing..."
          npx electron-builder --${{ matrix.target }} --publish never

      # Upload artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-${{ matrix.arch }}-build
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.msi
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.snap
            release/*.yml
            release/*.yaml
          if-no-files-found: warn
          retention-days: 14

  # Create GitHub release with installers and source code
  release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    if: needs.check-version.outputs.version_changed == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: get-version
        run: |
          VERSION=$(jq -r '.version' package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=v$VERSION" >> $GITHUB_OUTPUT

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*-build'
          merge-multiple: true

      - name: Create source code archives
        run: |
          # Create source code zip and tar.gz
          mkdir -p source-code

          # Create zip
          git archive --format=zip --output=source-code/source-code.zip HEAD

          # Create tar.gz
          git archive --format=tar.gz --output=source-code/source-code.tar.gz HEAD

          echo "Source code archives created:"
          ls -la source-code/

      - name: List all artifacts
        run: |
          echo "=== Build Artifacts ==="
          find artifacts -type f -ls
          echo ""
          echo "=== Source Code ==="
          find source-code -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get-version.outputs.tag_name }}
          name: "Release ${{ steps.get-version.outputs.version }}"
          files: |
            artifacts/**
            source-code/**
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## OpenClaw ${{ steps.get-version.outputs.version }}

            ### Installers
            - **macOS**: `.dmg` and `.zip` files (universal build for Intel and Apple Silicon)
            - **Windows**: `.exe` installer and portable version
            - **Linux**: `.AppImage`, `.deb` (Debian/Ubuntu), and `.rpm` (Fedora/RHEL)

            ### Source Code
            - `source-code.zip` - Source code as ZIP archive
            - `source-code.tar.gz` - Source code as TAR.GZ archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: mac
            name: macOS
            arch: universal
            electron_arch: x64,arm64
          - os: windows-latest
            target: win
            name: Windows
            arch: x64
            electron_arch: x64
          - os: ubuntu-latest
            target: linux
            name: Linux
            arch: x64
            electron_arch: x64

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      # Install dependencies WITHOUT running postinstall scripts
      - name: Install dependencies (skip scripts)
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
        run: pnpm install --frozen-lockfile --ignore-scripts

      # Manually download electron binary for this platform
      - name: Download electron binary
        shell: bash
        run: |
          ELECTRON_VERSION=41.0.4
          ELECTRON_CACHE_DIR="$HOME/.cache/electron"
          mkdir -p "$ELECTRON_CACHE_DIR"

          if [[ "${{ matrix.target }}" == "mac" ]]; then
            # Download both x64 and arm64 for macOS
            for arch in x64 arm64; do
              FILENAME="electron-v${ELECTRON_VERSION}-darwin-${arch}.zip"
              URL="https://github.com/electron/electron/releases/download/v${ELECTRON_VERSION}/${FILENAME}"
              echo "Downloading ${FILENAME}..."
              curl -L --retry 3 --retry-delay 5 -o "$ELECTRON_CACHE_DIR/$FILENAME" "$URL" || echo "Failed to download ${FILENAME}"
            done
          elif [[ "${{ matrix.target }}" == "win" ]]; then
            FILENAME="electron-v${ELECTRON_VERSION}-win32-x64.zip"
            URL="https://github.com/electron/electron/releases/download/v${ELECTRON_VERSION}/${FILENAME}"
            echo "Downloading ${FILENAME}..."
            curl -L --retry 3 --retry-delay 5 -o "$ELECTRON_CACHE_DIR/$FILENAME" "$URL"
          elif [[ "${{ matrix.target }}" == "linux" ]]; then
            FILENAME="electron-v${ELECTRON_VERSION}-linux-x64.zip"
            URL="https://github.com/electron/electron/releases/download/v${ELECTRON_VERSION}/${FILENAME}"
            echo "Downloading ${FILENAME}..."
            curl -L --retry 3 --retry-delay 5 -o "$ELECTRON_CACHE_DIR/$FILENAME" "$URL"
          fi

          echo "Electron cache contents:"
          ls -la "$ELECTRON_CACHE_DIR/"

      # Run electron postinstall manually
      - name: Run electron postinstall
        run: cd node_modules/electron && node install.js

      # Run electron-builder install-app-deps
      - name: Install app dependencies
        run: npx electron-builder install-app-deps

      - name: Build TypeScript
        run: pnpm build:ts

      # macOS signing setup
      - name: Setup macOS signing
        if: matrix.target == 'mac' && env.APPLE_CERTIFICATE
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productbuild: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      # Windows signing setup
      - name: Setup Windows signing
        if: matrix.target == 'win' && env.WIN_CERTIFICATE
        shell: bash
        env:
          WIN_CERTIFICATE: ${{ secrets.WIN_CERTIFICATE }}
        run: |
          echo "$WIN_CERTIFICATE" | base64 --decode > certificate.pfx

      # Build installers - separate steps for signed vs unsigned
      - name: Build ${{ matrix.name }} installer (with signing)
        if: matrix.target == 'mac' && env.APPLE_CERTIFICATE
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEYCHAIN: build.keychain
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building macOS with code signing..."
          npx electron-builder --mac --publish never

      - name: Build ${{ matrix.name }} installer (with signing)
        if: matrix.target == 'win' && env.WIN_CERTIFICATE
        env:
          WIN_CSC_LINK: certificate.pfx
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building Windows with code signing..."
          npx electron-builder --win --publish never

      - name: Build ${{ matrix.name }} installer (no signing)
        if: (matrix.target == 'mac' && !env.APPLE_CERTIFICATE) || (matrix.target == 'win' && !env.WIN_CERTIFICATE) || matrix.target == 'linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building ${{ matrix.name }} without signing..."
          npx electron-builder --${{ matrix.target }} --publish never

      # Upload artifacts
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-${{ matrix.arch }}-build
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.msi
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.snap
            release/*.yml
            release/*.yaml
          if-no-files-found: warn
          retention-days: 14

  # Create GitHub release with signed installers
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: '*-build'
          merge-multiple: true

      - name: List artifacts
        run: |
          echo "=== Build Artifacts ==="
          find artifacts -type f -ls

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          draft: true
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
