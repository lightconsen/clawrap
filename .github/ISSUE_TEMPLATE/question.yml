name: Question
description: Ask a question about Clawrap
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question? Fill out the form below and we'll get back to you!

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What would you like to know?
      placeholder: Type your question here...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Clawrap Version (if applicable)
      description: What version are you using?
      placeholder: "e.g., 1.0.6-build"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context or background information.
    validations:
      required: false
